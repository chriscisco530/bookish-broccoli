<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Vitals Login</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
</head>

<body class="login-body">

  <!-- Glow Effects -->
  <div class="login-glow glow-1"></div>
  <div class="login-glow glow-2"></div>

  <div class="login-container">

    <!-- Left Side -->
    <div class="login-brand">

      <div class="brand-logo">
        💚
      </div>

      <h1>Vitals</h1>

      <p>
        Track your health, habits, water intake,
        weight progress and daily performance.
      </p>

    </div>

    <!-- Right Side -->
    <div class="login-card">

      <h2>Welcome Back</h2>

      <p class="login-subtitle">
        Sign in to continue
      </p>

      <form id="loginForm">

        <div class="form-group">
          <label>Email Address</label>

          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label>Password</label>

          <input
            type="password"
            id="password"
            placeholder="Enter password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary login-btn">
          Login
        </button>

      </form>

      <div class="login-footer">
        Don’t have an account?
        <a href="#">Create Account</a>
      </div>

    </div>

  </div>

  <script src="login.js"></script>

</body>
</html>
